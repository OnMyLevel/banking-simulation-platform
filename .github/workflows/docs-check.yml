name: Documentation Check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List documentation files
        run: |
          echo "Documentation files:"
          find docs -type f -maxdepth 3 | sort
