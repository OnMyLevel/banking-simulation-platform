name: Vue App Checks

on:
  pull_request:
    paths:
      - 'frontend/vue-app/**'
      - '.github/workflows/frontend-vue-app.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/vue-app/**'
      - '.github/workflows/frontend-vue-app.yml'

jobs:
  vue-app:
    name: Vue App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/vue-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/vue-app/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
