server:
  port: 8081

spring:
  application:
    name: user-management-api
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: user_schema
  flyway:
    enabled: true
    schemas: user_schema
    default-schema: user_schema

management:
  endpoints:
    web:
      exposure:
        include: health,info
