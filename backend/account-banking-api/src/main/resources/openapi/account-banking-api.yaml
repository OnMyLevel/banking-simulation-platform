openapi: 3.0.3
info:
  title: Account Banking API
  version: 0.1.0
  description: Account context API for Banking Simulation Platform.
paths:
  /accounts:
    post:
      summary: Create a bank account
      responses:
        '201':
          description: Account created
    get:
      summary: List accounts by owner
      parameters:
        - name: owner_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Accounts found
  /accounts/{accountId}:
    get:
      summary: Get account by id
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Account found
        '404':
          description: Account not found
